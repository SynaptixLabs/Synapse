name: Bug report
description: Something broke — help us reproduce it
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! The fastest path to a fix is a reproducible story.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what did you get instead?
      placeholder: I clicked ✦ Distill on a note and …
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ./start.sh
        2. open http://localhost:5173
        3. …
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: "e.g. Windows 11 + WSL2 Ubuntu 26.04 · macOS 15 · Fedora 42"
    validations:
      required: true
  - type: textarea
    id: preflight
    attributes:
      label: Output of `./start.sh preflight` (or `.\start.cmd -Preflight`)
      description: Paste it verbatim — it tells us your Python/Node situation.
      render: text
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Backend console output around the failure (never paste API keys).
      render: text
