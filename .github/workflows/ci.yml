# CI — SYNAPSE
#
# Always-on: `agents` (adapter drift guard) · `backend` (full pytest suite on MOCK providers —
# zero paid model calls by design) · `frontend` (vite production build).
# Opt-in: `e2e` (real-Chromium Playwright against a fixture vault) via repo variable
# ENABLE_E2E_CI = "true" — it needs a browser download + a live stack (~2–3 min).

name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ========================
  # Agent layer — always on. Verifies canonical brain + thin adapters are consistent.
  # ========================
  agents:
    name: Agent adapter consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check adapters (personas → real classes, pointers resolve, no pasted bodies)
        run: python3 scripts/check_adapters.py
      - name: Self-test the guard (negative fixtures — proves it fails on drift)
        run: python3 scripts/check_adapters_selftest.py

  # ========================
  # Backend tests — the full unit/API suite. Model providers are MOCKED (SYNAPSE ships
  # mock seams for both models); this job can never spend money.
  # ========================
  backend:
    name: Backend tests (mocked models, zero paid calls)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run tests
        run: cd backend && python -m pytest -q

  # ========================
  # Frontend build — the explorer is dependency-light (vite + marked + dompurify);
  # a production build catches import/syntax breakage. Browser behavior is covered
  # by the opt-in `e2e` job below.
  # ========================
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Production build
        run: cd frontend && npm run build

  # ========================
  # Explorer E2E — real Chromium against a fixture vault. Opt-in: set repo variable
  # ENABLE_E2E_CI = "true" (Settings → Actions → Variables). Kept out of the always-on
  # path because it needs a browser download + a live stack (~2-3 min).
  # ========================
  e2e:
    name: Explorer E2E (real Chromium, fixture vault)
    if: vars.ENABLE_E2E_CI == 'true'
    runs-on: ubuntu-latest
    env:
      SYNAPSE_VAULT_PATH: ${{ github.workspace }}/data/vault
      SYNAPSE_SOURCE_REPOS: ${{ github.workspace }}/backend/tests/fixtures/repo_a,${{ github.workspace }}/backend/tests/fixtures/repo_b
      SYNAPSE_MOCK_MODELS: "1"   # the sprint-03 AI flow runs on the mock seams — zero cost
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Backend deps + fixture ingest
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/pip install -q -r backend/requirements.txt
          cd backend && .venv/bin/python -m synapse ingest
      - name: Frontend deps + Chromium
        run: |
          (cd frontend && npm ci)
          npm i --no-save playwright                       # at the REPO ROOT — the specs resolve it from tests/e2e upward
          npx playwright install --with-deps chromium
      - name: Start the stack
        run: |
          cd backend && nohup .venv/bin/python -m uvicorn app.main:app --port 8000 > /tmp/be.log 2>&1 &
          cd frontend && nohup npx vite --port 5173 --logLevel warn > /tmp/fe.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:8000/health > /dev/null && curl -sf http://localhost:5173 > /dev/null && break; sleep 1; done
      - name: Run E2E suites
        run: |
          node tests/e2e/sprint02_explorer.spec.mjs
          node tests/e2e/sprint01_wiki_popup.spec.mjs
          node tests/e2e/sprint01_dashboard.spec.mjs
          node tests/e2e/sprint03_distill_render.spec.mjs
      - name: Upload E2E evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: explorer-e2e-evidence
          path: tests/screenshots/
          if-no-files-found: ignore
